.btn {

  display: inline-flex;

  border-radius: var(--radius-lg);
  corner-shape: superellipse(1.5);
  color: var(--secondary-foreground);
  background: var(--secondary);
  cursor: var(--cursor-interaction, pointer);
  text-align: center;
  text-decoration: none;
  white-space: nowrap;

.btn:is(.btn-block, .viz-tile) {

.btn:not(:disabled):hover {

  height: 14px;
  flex: 0 0 auto;
  margin: 0;
  border: 1px solid var(--input);
  color: var(--primary-foreground);
  background-color: transparent;

  border-radius: var(--radius-sm);
  corner-shape: superellipse(1.5);
  background-color: var(--secondary);

  outline: 2px solid var(--ring);
  outline-offset: 2px;

  cursor: not-allowed;
  pointer-events: none;

.form-check:not(.form-switch) .form-check-input:disabled + .form-check-label {

.form-switch .form-check-input:disabled,
.form-switch .form-check-input:disabled + .form-check-label {
  cursor: not-allowed;
  opacity: 0.6;

.form-check-label {

}

.form-switch .form-check-input {
  position: relative;
  width: 32px;
  height: 20px;
  border: 0;
  border-radius: var(--radius-full);
  background: var(--muted);
  box-shadow: none;
  transition: background-color 200ms cubic-bezier(0, 0, 0.2, 1);

  position: absolute;
  top: 50%;
  left: 0;

  height: 16px;

  border: 1px solid light-dark(var(--primary-foreground), var(--foreground));

  box-shadow: var(--shadow-sm);
  content: &quot;&quot;;
  transform: translate(2px, -50%);
  transition: transform 200ms cubic-bezier(0, 0, 0.2, 1);
}

.form-switch .form-check-input:checked {
  background: var(--primary);
}

.form-switch .form-check-input:checked::before {
  transform: translate(14px, -50%);
}

.form-switch .form-check-input:focus-visible {

.form-range {

  height: 20px;
  margin-top: 4px;

  border-radius: var(--radius-full);
  background: light-dark(var(--primary-foreground), var(--foreground));

&lt;script&gt;
  (() =&gt; {
    const root = document.getElementById(&quot;ow-market-patterns&quot;);
    if (!root) return;
    const toast = (scope, text) =&gt; {
      const el = scope.querySelector(&quot;.toast&quot;);
      if (!el) return;
      el.textContent = text;
      el.classList.add(&quot;show&quot;);
      window.setTimeout(() =&gt; el.classList.remove(&quot;show&quot;), 1500);
    };
    root.querySelectorAll(&quot;.variant-pick&quot;).forEach((button) =&gt; {
      button.addEventListener(&quot;click&quot;, () =&gt; {
        root.querySelectorAll(&quot;.variant-pick&quot;).forEach((item) =&gt; {
          const selected = item === button;
          item.classList.toggle(&quot;btn-primary&quot;, selected);
          item.setAttribute(&quot;aria-pressed&quot;, String(selected));
        });
        root.querySelectorAll(&quot;.variant&quot;).forEach((variant) =&gt; variant.classList.toggle(&quot;active&quot;, variant.dataset.variant === button.dataset.pick));
      });
    });
    const triage = {
      approval:{title:&quot;允许执行测试命令？&quot;,meta:&quot;Codex · onlineWorker · 权限审批&quot;,body:&quot;pytest 将运行 Task Board 的定向回归测试。这个请求来自 OnlineWorker 管理的 app-server，可以在这里安全回写。&quot;,provider:&quot;Codex&quot;,workspace:&quot;onlineWorker&quot;,wait:&quot;2 分钟&quot;,actions:[&quot;允许&quot;,&quot;拒绝&quot;]},
      question:{title:&quot;部署目标需要确认&quot;,meta:&quot;Claude · release/1.7.5 · 用户提问&quot;,body:&quot;Provider 正在等待部署环境选择。回答会回到原始 Session，不产生本地替代状态。&quot;,provider:&quot;Claude&quot;,workspace:&quot;onlineWorker&quot;,wait:&quot;7 分钟&quot;,actions:[&quot;回答&quot;,&quot;打开&quot;]},
      stalled:{title:&quot;Session 已停止响应&quot;,meta:&quot;Codex · player-lite · 运行异常&quot;,body:&quot;最近 14 分钟没有新的 Provider 事件。可以尝试恢复；不支持时应返回明确原因。&quot;,provider:&quot;Codex&quot;,workspace:&quot;player-lite&quot;,wait:&quot;14 分钟&quot;,actions:[&quot;恢复&quot;,&quot;查看原因&quot;]},
      running:{title:&quot;Phase 19 UI 设计&quot;,meta:&quot;Claude · onlineWorker · 运行中&quot;,body:&quot;Session 正在对照成熟产品整理新的信息架构。中断必须作用于真实 Provider Session。&quot;,provider:&quot;Claude&quot;,workspace:&quot;onlineWorker&quot;,wait:&quot;运行中&quot;,actions:[&quot;中断&quot;,&quot;打开&quot;]},
      tests:{title:&quot;缓存读取链路测试&quot;,meta:&quot;Codex · player-lite · 运行中&quot;,body:&quot;当前已完成 48 / 82 个测试。可以打开完整 Session 或发送真实中断请求。&quot;,provider:&quot;Codex&quot;,workspace:&quot;player-lite&quot;,wait:&quot;运行中&quot;,actions:[&quot;中断&quot;,&quot;打开&quot;]}
    };
    root.querySelectorAll(&quot;[data-triage]&quot;).forEach((row) =&gt; {
      row.addEventListener(&quot;click&quot;, () =&gt; {
        const scope = row.closest(&quot;.variant&quot;);
        const data = triage[row.dataset.triage];
        if (!scope || !data) return;
        scope.querySelectorAll(&quot;[data-triage]&quot;).forEach((item) =&gt; item.classList.toggle(&quot;selected&quot;, item === row));
        scope.querySelector(&quot;[data-detail-title]&quot;).textContent = data.title;
        scope.querySelector(&quot;[data-detail-meta]&quot;).textContent = data.meta;
        scope.querySelector(&quot;[data-detail-body]&quot;).textContent = data.body;
        scope.querySelector(&quot;[data-fact-provider]&quot;).textContent = data.provider;
        scope.querySelector(&quot;[data-fact-workspace]&quot;).textContent = data.workspace;
        scope.querySelector(&quot;[data-fact-wait]&quot;).textContent = data.wait;
        scope.querySelector(&quot;[data-detail-actions]&quot;).innerHTML = data.actions.map((label, index) =&gt; `&lt;button class=&quot;btn ${index === 0 ? &quot;btn-primary&quot; : &quot;&quot;}&quot; data-detail-act&gt;${label}&lt;/button&gt;`).join(&quot;&quot;);
      });
    });
    root.addEventListener(&quot;click&quot;, (event) =&gt; {
      const button = event.target.closest(&quot;button&quot;);
      if (!button) return;
      const scope = button.closest(&quot;.variant&quot;);
      if (!scope) return;
      if (button.matches(&quot;[data-detail-act], [data-done]&quot;)) {
        toast(scope, `已提交：${button.textContent.trim()}`);
        const row = button.closest(&quot;[data-removable]&quot;);
        if (row) row.classList.add(&quot;done&quot;);
      }
      if (button.matches(&quot;[data-provider-action]&quot;)) {
        button.textContent = button.dataset.providerAction;
        button.disabled = true;
        toast(scope, &quot;请求已发送，等待 Provider 返回真实状态&quot;);
      }
    });
    root.querySelectorAll(&quot;[data-filter]&quot;).forEach((button) =&gt; {
      button.addEventListener(&quot;click&quot;, () =&gt; {
        const scope = button.closest(&quot;.variant&quot;);
        if (!scope) return;
        scope.querySelectorAll(&quot;[data-filter]&quot;).forEach((item) =&gt; item.classList.toggle(&quot;active&quot;, item === button));
        scope.querySelectorAll(&quot;[data-kind]&quot;).forEach((row) =&gt; { row.style.display = button.dataset.filter === &quot;all&quot; || row.dataset.kind === button.dataset.filter ? &quot;grid&quot; : &quot;none&quot;; });
      });
    });
    const syncBulk = (scope) =&gt; {
      const checked = [...scope.querySelectorAll(&quot;.row-check:checked&quot;)];
      const bulk = scope.querySelector(&quot;[data-bulk]&quot;);
      if (bulk) { bulk.disabled = checked.length === 0; bulk.textContent = checked.length ? `标为已处理 (${checked.length})` : &quot;标为已处理&quot;; }
    };
    root.querySelectorAll(&quot;.row-check&quot;).forEach((box) =&gt; box.addEventListener(&quot;change&quot;, () =&gt; syncBulk(box.closest(&quot;.variant&quot;))));
    root.querySelectorAll(&quot;[data-select-all]&quot;).forEach((box) =&gt; box.addEventListener(&quot;change&quot;, () =&gt; {
      const scope = box.closest(&quot;.variant&quot;);
      scope.querySelectorAll(&quot;.row-check&quot;).forEach((item) =&gt; { if (item.closest(&quot;.notification&quot;).style.display !== &quot;none&quot;) item.checked = box.checked; });
      syncBulk(scope);
    }));
    root.querySelectorAll(&quot;[data-bulk]&quot;).forEach((button) =&gt; button.addEventListener(&quot;click&quot;, () =&gt; {
      const scope = button.closest(&quot;.variant&quot;);
      const checked = [...scope.querySelectorAll(&quot;.row-check:checked&quot;)];
      checked.forEach((box) =&gt; box.closest(&quot;.notification&quot;).classList.add(&quot;done&quot;));
      toast(scope, `已处理 ${checked.length} 项`);
    }));
  })();
&lt;/script&gt;

&lt;script src=&quot;https://unpkg.com/@floating-ui/dom@1.7.4/dist/floating-ui.dom.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script&gt;
(() =&gt; {
  if (window.FloatingUIDOM == null) {
    return;
  }
  const { autoUpdate, computePosition, flip, offset, shift, size } =
    window.FloatingUIDOM;
  const tooltipPlacements = new Set([&quot;top&quot;, &quot;right&quot;, &quot;bottom&quot;, &quot;left&quot;]);
  const tooltipId = `codex-visualization-tooltip-${
    window.crypto?.randomUUID?.() ?? Date.now().toString(36)
  }`;
  const tooltipGap = 5;
  const hoverDelay = 700;
  const skipDelay = 300;
  let activeTrigger = null;
  let pendingTrigger = null;
  let tooltip = null;
  let openTimeout = null;
  let autoUpdateCleanup = null;
  let positionRequest = 0;
  let skipDelayUntil = 0;

  const getTrigger = (target) =&gt;
    target?.nodeType === Node.ELEMENT_NODE
      ? target.closest(&quot;[data-tooltip]&quot;)
      : null;
  const containsTarget = (trigger, target) =&gt;
    target?.nodeType != null &amp;&amp; trigger.contains(target);
  const getContent = (trigger) =&gt;
    trigger.getAttribute(&quot;data-tooltip&quot;)?.trim() ?? &quot;&quot;;

    const placement = trigger.getAttribute(&quot;data-tooltip-placement&quot;);
    return tooltipPlacements.has(placement) ? placement : &quot;top&quot;;
  };

    if (tooltip == null) {
      tooltip = document.createElement(&quot;div&quot;);
      tooltip.id = tooltipId;
      tooltip.className = &quot;tooltip&quot;;
      tooltip.setAttribute(&quot;role&quot;, &quot;tooltip&quot;);

    const ids = new Set(
      (trigger.getAttribute(&quot;aria-describedby&quot;) ?? &quot;&quot;)
        .split(/\s+/)

    );

      ids.add(tooltipId);
    } else {
      ids.delete(tooltipId);
    }

      trigger.removeAttribute(&quot;aria-describedby&quot;);

      trigger.setAttribute(&quot;aria-describedby&quot;, [...ids].join(&quot; &quot;));

    if (openTimeout != null) {
      window.clearTimeout(openTimeout);

    clearOpenTimeout();
    positionRequest += 1;
    autoUpdateCleanup?.();
    autoUpdateCleanup = null;
    if (activeTrigger == null) {
      return;
    }
    setDescribedBy(activeTrigger, false);
    activeTrigger = null;
    tooltip?.remove();

      skipDelayUntil = Date.now() + skipDelay;
    }
  };

    const request = ++positionRequest;

      middleware: [
        offset(tooltipGap),
        flip({ padding: tooltipGap }),
        shift({ padding: tooltipGap }),
        size({
          padding: tooltipGap,

            elements.floating.style.setProperty(
              &quot;--tooltip-available-width&quot;,
              `${Math.max(0, availableWidth)}px`,
            );
            elements.floating.style.setProperty(
              &quot;--tooltip-available-height&quot;,
              `${Math.max(0, availableHeight)}px`,
            );

      placement: getPlacement(trigger),
      strategy: &quot;fixed&quot;,
    })
      .then(({ x, y }) =&gt; {
        if (activeTrigger !== trigger || request !== positionRequest) {
          return;
        }
        const scale = window.devicePixelRatio || 1;
        floating.style.transform = `translate(${Math.round(x * scale) / scale}px, ${Math.round(y * scale) / scale}px)`;
        floating.style.visibility = &quot;visible&quot;;
      })
      .catch(() =&gt; {
        if (activeTrigger === trigger &amp;&amp; request === positionRequest) {
          closeTooltip(false);
        }
      });
  };
  const openTooltip = (trigger) =&gt; {
    const content = getContent(trigger);
    if (!trigger.isConnected || content.length === 0) {
      return;
    }
    clearOpenTimeout();
    if (activeTrigger === trigger) {
      return;
    }
    closeTooltip();
    const floating = getTooltip();
    floating.textContent = content;
    floating.style.visibility = &quot;hidden&quot;;
    floating.style.transform = &quot;translate(0, 0)&quot;;

      updatePosition(trigger, floating);

    if (
      getContent(trigger).length === 0 ||
      activeTrigger === trigger ||
      pendingTrigger === trigger
    ) {
      return;
    }
    clearOpenTimeout();
    pendingTrigger = trigger;
    const delay =
      immediate || activeTrigger != null || Date.now() &lt; skipDelayUntil
        ? 0
        : hoverDelay;
    if (delay === 0) {
      openTooltip(trigger);
      return;
    }
    openTimeout = window.setTimeout(() =&gt; {
      openTimeout = null;
      pendingTrigger = null;
      openTooltip(trigger);

  };
  const handlePointerOpen = (event) =&gt; {
    if (event.pointerType === &quot;touch&quot;) {
      return;
    }
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    requestOpen(trigger);

  const handleLeave = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {

    const trigger = getTrigger(event.target);

    closeTooltip(false);
    document.removeEventListener(&quot;pointerover&quot;, handlePointerOpen);
    document.removeEventListener(&quot;pointerout&quot;, handleLeave);
    document.removeEventListener(&quot;focusin&quot;, handleFocusIn);
    document.removeEventListener(&quot;focusout&quot;, handleLeave);
    document.removeEventListener(&quot;keydown&quot;, handleKeyDown);
    document.removeEventListener(&quot;contextmenu&quot;, handleContextMenu);
    tooltip = null;
  };

  document.addEventListener(&quot;pointerout&quot;, handleLeave);
  document.addEventListener(&quot;focusin&quot;, handleFocusIn);
  document.addEventListener(&quot;focusout&quot;, handleLeave);
  document.addEventListener(&quot;keydown&quot;, handleKeyDown);
  document.addEventListener(&quot;contextmenu&quot;, handleContextMenu);
  window.addEventListener(&quot;pagehide&quot;, destroy, { once: true });
})();
