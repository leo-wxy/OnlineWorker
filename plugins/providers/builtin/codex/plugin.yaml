schema_version: 1
id: codex
kind: provider
visibility: public
order: 10
runtime_id: codex
label: Codex
description: OpenAI Codex CLI sessions
default_visible: true
icon:
  path: icon.svg
  source: https://simpleicons.org/icons/openai.svg

provider:
  visible: true
  managed: true
  autostart: true
  runtime_id: codex
  bin: codex
  owner_transport: unix
  live_transport: shared_unix
  control_mode: app
  transport:
    type: unix
  compatibility:
    transport_policy: shared_app_server
  message_hooks:
    abusive_language_normalization:
      enabled: true
  capabilities:
    sessions: true
    send: true
    approvals: true
    questions: false
    photos: true
    files: true
    usage: true
    commands: true
    command_wrappers:
      - model
      - review
    control_modes:
      - app
      - tui
      - hybrid
    message_rewrite:
      app_send: true
      telegram: true
      external_cli: remote_proxy
      wrapper: ow-codex
      proxy_alias: alias codexR='/opt/homebrew/bin/codex --remote "unix://$HOME/Library/Application Support/OnlineWorker/codex_remote_proxy.sock" --cd "$(pwd)"'
    session_access:
      list: owner_bridge
      read: owner_bridge
      send: owner_bridge
      stream: none
  process:
    cleanup_matchers: []
  discovery:
    command_roots:
      - ~/.codex/commands
      - ~/.codex/superpowers/commands
      - ~/.codex/get-shit-done/commands
    skill_roots:
      - ~/.codex/skills
      - ~/.codex/superpowers/skills
  tui_host:
    sidecar_args:
      - --codex-tui-host
      - --codex-tui-cd={workspace}
      - --codex-tui-target={thread_id}
      - --codex-tui-extra-arg=--no-alt-screen
  health: {}
  auth: {}
  install:
    cli_names:
      - codex
    label: OpenAI Codex CLI
    method: npm
    command: npm install -g @openai/codex
    docs_url: https://github.com/openai/codex
  commands:
    - name: help
      scope: thread
      description: 查看 Codex slash command 帮助
    - name: init
      scope: thread
      description: 初始化 AGENTS 指南
    - name: status
      scope: thread
      description: 查看当前会话状态
    - name: permissions
      scope: thread
      description: 配置命令审批策略
    - name: model
      scope: thread
      description: 切换模型和推理强度
    - name: review
      scope: thread
      description: 对当前改动做 review
    - name: mcp
      scope: thread
      description: 查看 MCP 工具
    - name: compact
      scope: thread
      description: 压缩上下文
    - name: search
      scope: thread
      description: 执行搜索
    - name: plan
      scope: thread
      description: 规划下一步任务

ai:
  services:
    - id: openai_default
      name: OpenAI
      label: OpenAI
      description: OpenAI-compatible API service for OpenAI or compatible implementations.
      protocol: openai_compatible_chat
      base_url: https://api.openai.com/v1
      api_key_env: OPENAI_API_KEY
      models:
        - gpt-5.4
      default_model: gpt-5.4
      timeout_seconds: 20
      enabled: false
      default_for_scenarios: true

entrypoints:
  python_descriptor: plugins.providers.builtin.codex.python.provider:create_provider_descriptor
  python_config_normalizer: plugins.providers.builtin.codex.python.config_normalizer:normalize_provider_config
