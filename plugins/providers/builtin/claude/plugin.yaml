schema_version: 1
id: claude
kind: provider
visibility: public
order: 20
runtime_id: claude
label: Claude
description: Anthropic Claude Code CLI sessions
default_visible: true
icon:
  path: icon.svg
  source: https://simpleicons.org/icons/claude.svg

provider:
  visible: true
  managed: false
  autostart: false
  runtime_id: claude
  bin: claude
  owner_transport: stdio
  live_transport: stdio
  control_mode: app
  transport:
    type: stdio
  compatibility:
    auth_policy: external_cli_only
  message_hooks:
    abusive_language_normalization:
      enabled: false
  capabilities:
    sessions: true
    send: true
    approvals: true
    questions: true
    photos: true
    files: true
    usage: true
    commands: true
    launch_methods: true
    command_wrappers: []
    control_modes:
      - app
    message_rewrite:
      app_send: true
      telegram: true
      external_cli: http_proxy
      wrapper: ow-claude
    session_access:
      list: owner_bridge
      read: owner_bridge
      send: owner_bridge
      stream: none
  process:
    cleanup_matchers: []
  discovery:
    skill_roots:
      - ~/.claude/skills
  install:
    cli_names:
      - claude
    label: Anthropic Claude Code CLI
    method: npm
    command: npm install -g @anthropic-ai/claude-code
    docs_url: https://docs.anthropic.com/en/docs/claude-code/getting-started
  health: {}
  commands:
    - name: doctor
      scope: global
      description: 执行 Claude CLI 自检（静态 fallback catalog）
    - name: auth
      scope: global
      description: 查看或调整 Claude CLI 鉴权状态（静态 fallback catalog）
    - name: mcp
      scope: global
      description: 查看 Claude CLI 的 MCP 配置入口（静态 fallback catalog）
    - name: plugins
      scope: global
      description: 查看 Claude CLI 插件入口（静态 fallback catalog）
    - name: update
      scope: global
      description: 检查 Claude CLI 更新（静态 fallback catalog）

ai:
  services:
    - id: anthropic_default
      name: Anthropic
      label: Claude
      description: Claude Messages API service for Anthropic Claude.
      protocol: anthropic_messages
      endpoint: https://api.anthropic.com/v1/messages
      api_key_env: ANTHROPIC_API_KEY
      models:
        - claude-sonnet-4-6
      default_model: claude-sonnet-4-6
      timeout_seconds: 20
      enabled: false

entrypoints:
  python_descriptor: plugins.providers.builtin.claude.python.provider:create_provider_descriptor
  python_document_normalizer: plugins.providers.builtin.claude.python.config_normalizer:normalize_config_document
