# OnlineWorker Configuration
# Main Telegram bot credentials are in .env. Notification plugin settings live below.

schema_version: 2

providers:
  codex:
    managed: true
    autostart: true
    bin: "codex"
    owner_transport: "stdio"
    live_transport: "owner_bridge"
    transport:
      type: "stdio"
    control_mode: "app"
    message_hooks:
      abusive_language_normalization:
        enabled: true

  claude:
    managed: false
    autostart: false
    bin: "claude"
    owner_transport: "stdio"
    live_transport: "stdio"
    transport:
      type: "stdio"
    message_hooks:
      abusive_language_normalization:
        enabled: false

logging:
  level: "INFO"

notifications:
  channels:
    telegram:
      enabled: true
      config:
        bot_token: ""
        recipient_user_id: ""
