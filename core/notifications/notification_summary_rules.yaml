limits:
  title: 16
  summary: 80

sections:
  result:
    - 本轮修复
    - 本次修复
    - 核心变化
    - 主要变化
    - 完成内容
    - 变更内容
    - 修复内容
  stop:
    - 验证结果
    - 测试结果
    - 已验证
    - 验证
    - 测试
    - 示例
    - 通知示例
    - 原因
    - 说明

noise:
  prefixes:
    - 已继续聚焦
    - 继续聚焦
    - 这次针对
    - 本次针对
    - 已修掉
    - 已修复
    - 已处理
    - 已完成
  contains:
    - 通知示例
    - 打进安装态
    - /Applications/OnlineWorker.app
  suffixes:
    - 示例是
  regexes:
    - "^\\d+\\s+passed$"

title:
  rules:
    - pattern: "通知|任务摘要|短标题|通知文案"
      title: "优化任务通知"
    - pattern: "token_usage|ccusage|usage|用量"
      title: "修复用量统计"
    - pattern: "Computer Use|get_app_state|list_apps"
      title: "排查 Computer Use"
    - pattern: "command|命令"
      title: "修复命令入口"
    - pattern: "无明确许可不允许打包|未经允许不允许打包|无许可.*打包"
      title: "无许可打包规则"
  strip_prefixes:
    - 已经
    - 已把
    - 已将
    - 已新增
    - 已修复
    - 已优化
    - 已调整
    - 已完善
    - 已接入
    - 已
    - 把
    - 将
    - 新增
    - 修复
    - 优化
    - 调整
    - 完善
    - 接入
  remove_patterns:
    - "`[^`]+`"
    - "\\[[^\\]]+\\]\\([^\\)]*\\)"
    - "\\b[A-Za-z0-9_.-]+\\.(?:md|py|ts|tsx|rs|yaml|yml|json)\\b"
    - "/[^\\s，。；,]+"
