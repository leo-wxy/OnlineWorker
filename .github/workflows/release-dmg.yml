name: Release DMG

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing GitHub Release tag to upload the DMG to
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-dmg:
    name: Build Apple Silicon DMG
    runs-on: macos-15
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Python build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate
          pnpm --version

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Verify GitHub CLI
        run: gh --version

      - name: Build DMG
        env:
          PYTHON_ARM64: ${{ env.pythonLocation }}/bin/python
        run: bash scripts/build.sh

      - name: Resolve release tag
        id: release_tag
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            tag="${{ github.event.release.tag_name }}"
          else
            tag="${{ inputs.release_tag }}"
          fi

          if [ -z "$tag" ]; then
            echo "ERROR: release tag is required"
            exit 1
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: onlineworker-dmg-${{ steps.release_tag.outputs.tag }}
          path: mac-app/src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error

      - name: Upload DMG to GitHub Release
        run: |
          gh release upload "${{ steps.release_tag.outputs.tag }}" \
            mac-app/src-tauri/target/release/bundle/dmg/*.dmg \
            --clobber
